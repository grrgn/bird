server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Поддержка клиентского роутинга (React Router)
    # Если запрашиваемый файл не найден - отдаем index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Оптимизация: кэширование статических ассетов (css, js, картинки)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
